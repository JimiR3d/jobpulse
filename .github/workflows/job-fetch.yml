name: JobPulse Scheduler

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours — 12 runs/day
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

jobs:
  fetch-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 25       # Safety — kills runaway runs

    steps:
      # SHA-pinned to cryptographically immutable commits (Security Patch #5)
      # Tag equivalents shown in comments for reference
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scheduler/requirements.txt

      - name: Install dependencies
        run: pip install -r scheduler/requirements.txt

      - name: Run scheduler
        run: python scheduler/main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # GITHUB_TOKEN is automatically injected by Actions — no need to add as secret
          # It raises the GitHub API rate limit from 60 to 5,000 req/hr for the GitHub README parser
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
